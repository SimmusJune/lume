<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lume - App Support</title>
  <style>
    :root {
      --bg: #0b0d10;
      --card: #151922;
      --text: #f3f6fb;
      --muted: #b5bfd1;
      --line: #2a3241;
      --brand: #9dff85;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 800px at 85% -10%, #1d2432 0%, var(--bg) 55%);
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    .card {
      background: rgba(21, 25, 34, 0.82);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      backdrop-filter: blur(6px);
    }
    h1 { margin: 0 0 8px; font-size: 34px; line-height: 1.1; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    .links {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }
    a {
      display: block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      background: #111622;
    }
    a:hover { border-color: var(--brand); }
    .foot {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
    }
    .accent { color: var(--brand); font-weight: 700; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Lume</h1>
      <p>Official support and privacy pages for the Lume iOS app.</p>
      <div class="links">
        <a href="./support/"><span class="accent">Support</span><br />Contact, FAQ, and troubleshooting.</a>
        <a href="./privacy/"><span class="accent">Privacy Policy</span><br />How Lume handles your data.</a>
      </div>
      <p class="foot">Copyright <span id="y"></span> ZHU JIAJUN</p>
    </section>
  </main>
  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
